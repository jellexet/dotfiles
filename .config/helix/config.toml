theme = "rose_pine"

[editor]
line-number = "relative"
bufferline = "always"
auto-format = true
text-width = 120

[editor.cursor-shape]
insert = "bar"

[editor.inline-diagnostics]
cursor-line = "warning"
other-lines = "disable"

[keys.normal]
C-h = "jump_view_left"
C-l = "jump_view_right"
C-j = "jump_view_down"
C-k = "jump_view_up"
C-pageup = "goto_previous_buffer"
C-pagedown = "goto_next_buffer"
G = "goto_last_line"

[keys.select]
u = "switch_to_lowercase"
U = "switch_to_uppercase"
